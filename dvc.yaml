stages:
  parse_corpus:
    cmd: python src/parse_corpus.py
    deps:
    - data/raw
    - data/raw/metadata.csv
    - src/parse_corpus.py
    outs:
    - data/processed/phoneme_table.csv
  extract_acoustics:
    cmd: pixi run python src/extract_acoustics.py
    deps:
    - data/processed/phoneme_table.csv
    - data/raw
    - src/extract_acoustics.py
    outs:
    - data/features/features_acoustic.csv
  extract_neural_whisper:
    cmd: pixi run python src/extract_neural_whisper.py
    deps:
    - data/processed/phoneme_table.csv
    - src/extract_neural_whisper.py
    params:
    - whisper.model_name
    - whisper.layers
    outs:
    - data/features/features_whisper_layer20.npz
    - data/features/features_whisper_layer4.npz
  extract_neural_xlsr:
    cmd: pixi run python src/extract_neural_xlsr.py
    deps:
    - data/processed/phoneme_table.csv
    - src/extract_neural_xlsr.py
    params:
    - xlsr.model_name
    - xlsr.layers
    outs:
    - data/features/features_xlsr_layer10.npz
    - data/features/features_xlsr_layer20.npz
    - data/features/features_xlsr_layer4.npz
  normalize_acoustics:
    cmd: pixi run python src/normalize_acoustics.py
    deps:
    - data/features/features_acoustic.csv
    - src/normalize_acoustics.py
    params:
    - normalization
    outs:
    - data/features/features_acoustic_norm.csv
  descriptive_statistics:
    cmd: pixi run python src/descriptive_statistics.py
    deps:
    - data/features/features_acoustic_norm.csv
    - src/descriptive_statistics.py
    params:
    - descriptive_stats
    outs:
    - results/descriptive_statistics.csv
  acoustic_visualizations:
    cmd: pixi run python src/acoustic_visualizations.py
    deps:
    - data/features/features_acoustic_norm.csv
    - src/acoustic_visualizations.py
    params:
    - plots
    outs:
    - results/figures/boxplots.png
    - results/figures/violin_plots.png
    - results/figures/vowel_chart.png
  neural_visualizations:
    cmd: pixi run python src/neural_visualizations.py
    deps:
    - data/features/features_whisper_layer20.npz
    - data/features/features_xlsr_layer20.npz
    - params.yaml
    - src/neural_visualizations.py
    outs:
    - results/figures/whisper_pca.png
    - results/figures/whisper_umap.png
    - results/figures/xls-r_pca.png
    - results/figures/xls-r_umap.png
    - results/neural_statistics.csv
  rsm_analysis:
    cmd: pixi run python src/rsm_analysis.py
    deps:
    - data/features/features_acoustic_norm.csv
    - data/features/features_whisper_layer20.npz
    - data/features/features_xlsr_layer20.npz
    - params.yaml
    - src/rsm_analysis.py
    outs:
    - results/rsm_statistics.csv

  section6_analysis:
    cmd: pixi run python src/section6_analysis.py
    deps:
    - data/features/features_acoustic_norm.csv
    - data/features/features_whisper_layer20.npz
    - data/features/features_xlsr_layer20.npz
    - src/section6_analysis.py
    outs:
    - results/acoustic_tests.csv
    - results/classification_results.csv
    - results/distances
    - results/neural_tests.csv
  section7_mixed_models:
    cmd: pixi run python src/section7_mixed_models.py
    deps:
    - data/features/features_acoustic_norm.csv
    - data/features/features_whisper_layer20.npz
    - data/features/features_xlsr_layer20.npz
    - src/section7_mixed_models.py
    params:
    - neural_analysis.whisper_file
    - neural_analysis.xlsr_file
    - normalization.output_csv
    outs:
    - results/mixed_models
  section8_analysis:
    cmd: pixi run python src/section8_analysis.py
    deps:
    - data/features/features_acoustic_norm.csv
    - data/features/features_whisper_layer20.npz
    - data/features/features_xlsr_layer20.npz
    - src/section8_analysis.py
    params:
    - section8
    outs:
    - results/acoustic_ci_results.csv
    - results/figures/forest_F1_norm_L1_binary.png
    - results/figures/forest_F1_norm_L1_binary_gender_binary.png
    - results/figures/forest_F2_norm_L1_binary.png
    - results/figures/forest_F2_norm_L1_binary_gender_binary.png
    - results/figures/forest_neural_whisper.png
    - results/figures/forest_neural_xlsr.png
    - results/neural_ci_results.csv
    - results/section8_rope_summary.csv
  section9_clustering:
    cmd: pixi run python src/section9_clustering.py
    deps:
    - data/features/features_acoustic_norm.csv
    - data/features/features_whisper_layer20.npz
    - data/features/features_xlsr_layer20.npz
    - src/section9_clustering.py
    outs:
    - results/figures/dendrogram_acoustic.png
    - results/figures/dendrogram_whisper.png
    - results/figures/dendrogram_xlsr.png
    - results/figures/speaker_dendrogram_acoustic.png
    - results/figures/speaker_dendrogram_whisper.png
    - results/figures/speaker_dendrogram_xlsr.png
    - results/section9_phoneme_clusters.csv
    - results/section9_speaker_clustering.csv
    - results/section9_systematic_phoneme_patterns.csv
    - results/section9_vowel_clustering.csv
  section9_extensions:
    cmd: pixi run python src/section9_extensions.py
    deps:
    - data/features/features_acoustic_norm.csv
    - data/features/features_whisper_layer20.npz
    - data/features/features_xlsr_layer20.npz
    - src/section9_extensions.py
    outs:
    - results/section9_consonant_vowel_clustering.csv
    - results/section9_silhouette_scores.csv
