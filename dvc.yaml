stages:
  parse_corpus:
    cmd: python src/parse_corpus.py
    deps:
    - data/raw
    - data/raw/metadata.csv
    - src/parse_corpus.py
    outs:
    - data/processed/phoneme_table.csv
  extract_acoustics:
    cmd: pixi run python src/extract_acoustics.py
    deps:
    - data/processed/phoneme_table.csv
    - data/raw
    - src/extract_acoustics.py
    outs:
    - data/features/features_acoustic.csv
  extract_neural_whisper:
    cmd: pixi run python src/extract_neural_whisper.py
    deps:
    - data/processed/phoneme_table.csv
    - params.yaml
    - src/extract_neural_whisper.py
    outs:
    - data/features/features_whisper_layer20.npz
    - data/features/features_whisper_layer4.npz
  extract_neural_xlsr:
    cmd: pixi run python src/extract_neural_xlsr.py
    deps:
    - data/processed/phoneme_table.csv
    - params.yaml
    - src/extract_neural_xlsr.py
    outs:
    - data/features/features_xlsr_layer10.npz
    - data/features/features_xlsr_layer20.npz
    - data/features/features_xlsr_layer4.npz
